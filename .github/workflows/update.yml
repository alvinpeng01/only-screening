name: Update listings

# Refreshes data.js from the theatres each morning and commits the result,
# which republishes the GitHub Pages site. Also runnable on demand from the
# Actions tab ("Run workflow").
on:
  schedule:
    - cron: "15 11 * * *"   # 11:15 UTC ≈ 07:15 America/Toronto
  workflow_dispatch:

# Allow the job to push the regenerated data back to the repo.
permissions:
  contents: write

concurrency:
  group: update-listings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild + enrich listings
        env:
          # Optional: add a repo secret named TMDB_KEY to use TMDB for metadata
          # (faster/more complete than Wikipedia). Without it, Wikipedia is used.
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: |
          python3 update.py --all
          python3 update.py --enrich --passes 4

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain data.js data.json)" ]; then
            echo "No listing changes."; exit 0
          fi
          # data.js/data.json are fully regenerated each run (see .gitattributes:
          # they're marked -merge -diff), so if a manual push landed on main
          # while this job was running, there's nothing to reconcile — this
          # run's freshly-enriched files always win. On a rejected push, sync
          # to the new main and re-commit just these two files on top of it,
          # rather than attempting a real merge (which would conflict, with
          # no one in CI to resolve it).
          cp data.js /tmp/data.js.new
          cp data.json /tmp/data.json.new
          for i in 1 2 3; do
            git add data.js data.json
            git commit -q -m "chore: refresh listings ($(date -u +%Y-%m-%d))"
            git push && { echo "Pushed."; exit 0; }
            echo "Push rejected (attempt $i) — syncing to latest main and reapplying…"
            git fetch origin main
            git reset --hard origin/main    # fully sync first, so no stale local
            cp /tmp/data.js.new data.js     # file (e.g. update.py) rides along —
            cp /tmp/data.json.new data.json # only the two data files get overlaid.
          done
          echo "::error::Could not push after 3 attempts."; exit 1
