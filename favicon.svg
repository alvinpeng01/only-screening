    <rect x="7.6" y="6.2" width="2.2" height="2.6" rx="0.6"/>
    <rect x="7.6" y="11" width="2.2" height="2.6" rx="0.6"/>
    <rect x="7.6" y="15.8" width="2.2" height="2.6" rx="0.6"/>
    <rect x="7.6" y="20.6" width="2.2" height="2.6" rx="0.6"/>
    <rect x="22.2" y="6.2" width="2.2" height="2.6" rx="0.6"/>
    <rect x="22.2" y="11" width="2.2" height="2.6" rx="0.6"/>
    <rect x="22.2" y="15.8" width="2.2" height="2.6" rx="0.6"/>
    <rect x="22.2" y="20.6" width="2.2" height="2.6" rx="0.6"/>
  </g>
  <!-- spotlight in the frame window -->
  <circle cx="16" cy="16" r="3.6" fill="#e4c98d"/>
</svg>
